<!DOCTYPE html>
<html>
<head>
<title>Hiragana Quiz</title>
<script type="text/javascript" src="../js/main.js"></script>
<script type="text/javascript" src="../js/dialog.js"></script>
<script type="text/javascript" src="../fontawesome/js/all.min.js"></script>
<script type="text/javascript" src="../js/memorygame.js"></script>
<link rel="stylesheet" type="text/css" href="../css/main.css" />
<link rel="stylesheet" type="text/css" href="../css/dialog.css">
<link rel="stylesheet" type="text/css" href="../fontawesome/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0">
<meta charset="UTF-8">
</head>
<body>
	<style>
		@media(orientation: portrait){
			.bar{
				font-size: 3.25vh;
			}
			.mainBar{
				font-size: 3vh;
			}
			.mainBar button, .mainBar input[type="button"]{
				font-size: 5vh;
			}
			#dialog1 .dialogBody{
				font-size: 3.3vh;
			}
			.card{
				width: 10vh;
				height: 14vh;
			}
		}
		@media(orientation: landscape){
			.bar{
				font-size: 3.25vw;
			}
			.mainBar{
				font-size: 6vw;
			}
			.mainBar button, .mainBar input[type="button"]{
				font-size: 5vw;
			}
			#dialog1 .dialogBody{
				font-size: 3.3vw;
			}
			.card{
				width: 10vw;
				height: 14vw;
			}
		}
		.clock, .score, #question, #question2, #answerBar{
			font-weight: bolder;
			border: 2px solid #000000;
			width: auto;
			border-radius: 20px;
		}
		#dialog1 .dialogBody{
			color: #000000;
			text-align: center;
		}
		#dialog1 .dialogBody button{
			width: 40%;
		}
		.card{
			color: #FFFFFF;
		}
		.card:hover{
			cursor: pointer;
			color: #FFFFFF;
		}
	</style>
	<div id="dialogBg1" class="dialogBg">
		<div id="dialog1" class="dialog">
			<div class="dialogHead">
				Game Result
			</div>
			<div class="dialogBody">
				<i class='fas fa-plus'></i>&nbsp;<i class="fas fa-coins"></i>&nbsp;<span id="myScore">0</span><br>
				<i class="fas fa-trophy"></i>&nbsp;<span id="myHighScore">0</span><br><br>
				<button onclick='document.location.href="./memorygame.html";'>
					&nbsp;&nbsp;&nbsp;<i class="fas fa-redo"></i>&nbsp;&nbsp;&nbsp;
				</button>
				<button onclick='document.location.href="../index.html";'>
					&nbsp;&nbsp;&nbsp;<i class="fas fa-bars"></i>&nbsp;&nbsp;&nbsp;
				</button>
			</div>
		</div>
	</div>
	<div class="bar">
		<span class="clock">
			&nbsp;<i class="far fa-clock"></i>&nbsp;<span id="time">1</span>
		</span>&nbsp; &nbsp;
		<span class="score">
			&nbsp;<i class="fas fa-coins"></i>&nbsp;<span id="coins">0</span>&nbsp;
		</span>
	</div><br>
	<div class="mainBar">
		<span>
			<button class="card"><i class="fas fa-question-circle"></i></button>
			<button class="card"><i class="fas fa-question-circle"></i></button>
			<button class="card"><i class="fas fa-question-circle"></i></button>
			<button class="card"><i class="fas fa-question-circle"></i></button><br><br>
			<button class="card"><i class="fas fa-question-circle"></i></button>
			<button class="card"><i class="fas fa-question-circle"></i></button>
			<button class="card"><i class="fas fa-question-circle"></i></button>
			<button class="card"><i class="fas fa-question-circle"></i></button>
		</span>
	</div>
</body>
</html>
